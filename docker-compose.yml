services:
  postgres:
    image: postgres:18
    container_name: courtlane-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: courtlane
      POSTGRES_PASSWORD: courtlane
      POSTGRES_DB: courtlane
    ports:
      - '5432:5432'
    volumes:
      - postgres-data:/var/lib/postgresql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U courtlane -d courtlane']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
