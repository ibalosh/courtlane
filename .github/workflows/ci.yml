name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    name: Checks
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://courtlane:courtlane@localhost:5432/courtlane
      API_PORT: 4400
      API_BASE_URL: http://localhost:4400/api
      WEB_APP_URL: http://localhost:4200
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: courtlane
          POSTGRES_PASSWORD: courtlane
          POSTGRES_DB: courtlane
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U courtlane -d courtlane"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Check formatting
        run: yarn format:check

      - name: Lint
        run: yarn lint

      - name: Build
        run: yarn build

      - name: Prepare database
        run: yarn db:prepare

      - name: Test
        run: yarn test
